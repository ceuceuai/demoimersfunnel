<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iMersFunnel | Menghubungkan...</title>
  
  <!-- Tailwind CSS Framework -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Font: Plus Jakarta Sans (Premium Look) -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons Library -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /**
     * TAMPILAN DASAR & BACKGROUND
     * Menggunakan radial gradient untuk kesan kedalaman (depth) yang premium.
     */
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a); 
      min-height: 100vh; 
      color: white; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /**
     * GLASSMORPHISM EFFECT
     * Efek kaca transparan pada form utama.
     */
    .glass { 
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(24px); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); 
      border-radius: 1.5rem; 
      padding: 2.5rem; 
      width: 100%; 
      max-width: 440px; 
      margin-top: 2rem;
      position: relative;
      overflow: hidden;
    }

    /**
     * FORM INPUT STYLING
     */
    .input-control { 
      background: rgba(30, 41, 59, 0.6); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      width: 100%; 
      padding: 1.1rem 1.3rem; 
      border-radius: 0.85rem; 
      margin-top: 0.6rem; 
      outline: none; 
      transition: all 0.3s ease; 
      color: white; 
      font-size: 0.95rem;
    }
    
    .input-control:focus { 
      border-color: #6366f1; 
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); 
      background: rgba(30, 41, 59, 0.8);
    }

    /**
     * BUTTON CTA STYLING
     * Gradient indigo ke purple dengan efek hover transform.
     */
    .btn-cta { 
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 12px 20px -5px rgba(99, 102, 241, 0.4);
      cursor: pointer;
      font-weight: 800;
    }
    
    .btn-cta:hover { 
      transform: translateY(-3px) scale(1.02); 
      filter: brightness(1.1);
      box-shadow: 0 20px 30px -10px rgba(99, 102, 241, 0.5);
    }

    .btn-cta:disabled {
      filter: grayscale(1);
      cursor: not-allowed;
      opacity: 0.7;
    }

    /**
     * LOADING OVERLAY
     */
    #loader-overlay {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    /**
     * ANIMATIONS
     */
    .animate-in {
      animation: fadeInEffect 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    
    @keyframes fadeInEffect {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- LAYER 1: LOADING SCREEN -->
  <div id="loader-overlay">
    <div class="flex flex-col items-center gap-6 text-center">
      <div id="loader-spinner" class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
      <div class="space-y-2">
        <p id="loader-text" class="text-[11px] font-black text-indigo-400 uppercase tracking-[0.4em] animate-pulse">Menghubungkan Server...</p>
        <p class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">Sinkronisasi Database Aktif</p>
      </div>
    </div>
  </div>

  <!-- LAYER 2: DYNAMIC BRANDING HEADER -->
  <header class="text-center animate-in relative z-10">
    <!-- Logo dinamis (Muncul jika URL Logo diisi di Campaign/Global) -->
    <div id="logoWrapper" class="hidden transform transition-all duration-700 mb-8">
      <img id="dynamicLogo" src="" alt="Brand Logo" class="h-20 w-auto mx-auto object-contain drop-shadow-[0_10px_20px_rgba(99,102,241,0.4)]">
    </div>
    
    <!-- Nama Aplikasi Dinamis -->
    <h1 id="dynamicAppName" class="text-4xl font-extrabold tracking-tighter text-white/95 uppercase tracking-widest bg-clip-text text-transparent bg-gradient-to-b from-white to-white/60">
      <!-- Data dari API -->
    </h1>
    
    <!-- Tagline Dinamis -->
    <p id="dynamicTagline" class="text-slate-400 text-sm mt-3 font-medium max-w-xs mx-auto leading-relaxed opacity-80">
      <!-- Data dari API -->
    </p>
  </header>

  <!-- LAYER 3: MAIN CONTENT CARD -->
  <main class="glass animate-in relative z-10" style="animation-delay: 0.25s;">
    
    <!-- STATE 3.1: DATA COLLECTION FORM -->
    <div id="formWrapper" class="transition-all duration-500">
      <div class="text-center mb-10">
        <h2 class="text-xl font-extrabold text-white tracking-tight">Daftar Sekarang</h2>
        <div class="w-12 h-1 bg-indigo-500 mx-auto mt-3 rounded-full opacity-50"></div>
      </div>
      
      <form id="leadForm" onsubmit="handleSubmit(event)" class="space-y-7">
        <!-- Campaign ID Hidden Field -->
        <input type="hidden" id="campaignInput" name="campaign" value="GENERAL">
        
        <!-- Field Nama -->
        <div class="group">
          <label class="text-[11px] font-bold text-slate-500 ml-1 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
            Nama Lengkap
          </label>
          <input type="text" name="nama" required placeholder="Contoh: Budi Santoso" class="input-control">
        </div>

        <!-- Field Email -->
        <div class="group">
          <label class="text-[11px] font-bold text-slate-500 ml-1 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
            Email Aktif
          </label>
          <input type="email" name="email" required placeholder="budi@email.com" class="input-control">
        </div>

        <!-- Field WhatsApp -->
        <div class="group">
          <label class="text-[11px] font-bold text-slate-500 ml-1 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
            Nomor WhatsApp
          </label>
          <input type="tel" name="wa" required placeholder="0812xxxxxx" class="input-control">
        </div>

        <!-- Tombol Submit Dinamis -->
        <button type="submit" id="submitBtn" class="btn-cta w-full py-5 rounded-2xl font-black text-lg shadow-2xl mt-6 uppercase tracking-wider">
          <!-- Teks Tombol dari API -->
        </button>

        <!-- Trust Badge -->
        <div class="flex items-center justify-center gap-3 mt-8 py-3 px-4 bg-white/5 rounded-xl border border-white/5 opacity-60">
          <i data-lucide="shield-check" class="w-4 h-4 text-indigo-400"></i>
          <p class="text-[10px] text-slate-400 font-extrabold uppercase tracking-widest">Data Anda Aman 100%</p>
        </div>
      </form>
    </div>

    <!-- STATE 3.2: SUCCESS STATE -->
    <div id="successState" class="hidden text-center py-12">
      <div class="w-24 h-24 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-indigo-500/20">
        <i data-lucide="party-popper" class="w-12 h-12 text-indigo-400"></i>
      </div>
      <h2 class="text-3xl font-black mb-4 text-white tracking-tighter uppercase">Berhasil!</h2>
      <p id="successMsg" class="text-slate-400 text-sm mb-10 leading-relaxed font-medium px-4">
        Data pendaftaran Anda telah kami terima. Pesan otomatis sedang dikirim ke WhatsApp Anda.
      </p>
      <div class="inline-flex items-center gap-3 px-6 py-3 bg-white/5 rounded-2xl border border-white/10">
        <div class="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-ping"></div>
        <p class="text-[10px] text-slate-300 font-black uppercase tracking-[0.3em]">Mengarahkan Halaman...</p>
      </div>
    </div>
  </main>

  <!-- LAYER 4: FOOTER SECTION -->
  <footer class="mt-16 text-center opacity-30">
    <p class="text-[10px] text-slate-500 font-black tracking-[0.4em] uppercase">
      &copy; 2026 iMersFunnel Pro &bull; Smart Funnel Engine
    </p>
  </footer>

  <!-- SCRIPT LOGIC: SYNC & FORM HANDLING -->
  <script>
    /**
     * KONFIGURASI BACKEND API
     * URL Web App dari Google Apps Script yang sudah di-deploy secara publik.
     */
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzXlMjRlKGybOmFvqukScuNr02qKs4VR46m3tIPep6ahuVkdPU0w0dGjhwJQ0YlQHuWew/exec"; 

    /**
     * LOGIKA DETEKSI CAMPAIGN
     * Mendeteksi ID Campaign dari Path URL (Vercel Rewrite) atau Query Parameter.
     */
    const urlParams = new URLSearchParams(window.location.search);
    const pathSegments = window.location.pathname.split('/').filter(Boolean);
    const pathCampaign = pathSegments.pop();
    const campaignId = urlParams.get('campaign') || pathCampaign || "GENERAL";
    
    let appSettings = {}; // Menampung data branding & redirect dari server

    /**
     * FUNGSI: INISIALISASI HALAMAN (FETCH SETTINGS)
     */
    async function initPage() {
      const loaderOverlay = document.getElementById('loader-overlay');
      const loaderText = document.getElementById('loader-text');
      const loaderSpinner = document.getElementById('loader-spinner');

      try {
        // Melakukan request GET ke backend untuk mengambil data Branding Dinamis
        const apiPath = `${WEB_APP_URL}?action=getSettings&campaign=${campaignId}`;
        const response = await fetch(apiPath);
        
        if (!response.ok) throw new Error("Gagal terhubung ke Server");
        
        appSettings = await response.json();
        
        // --- TERAPKAN BRANDING DINAMIS (Penting!) ---
        // Judul Tab Browser
        document.title = appSettings.appName || "iMersFunnel";
        
        // Judul Aplikasi di Header
        document.getElementById('dynamicAppName').innerText = appSettings.appName || "iMersFunnel";
        
        // Tagline Aplikasi
        document.getElementById('dynamicTagline').innerText = appSettings.tagline || "";
        
        // Teks Tombol CTA
        document.getElementById('submitBtn').innerText = appSettings.btnText || "Daftar Sekarang";
        
        // Pasang Campaign ID ke input hidden
        document.getElementById('campaignInput').value = campaignId;

        // Logika Tampilan Logo (Dinamis per Campaign)
        if (appSettings.showLogo && appSettings.logoUrl) {
          const logoImg = document.getElementById('dynamicLogo');
          logoImg.src = appSettings.logoUrl;
          document.getElementById('logoWrapper').classList.remove('hidden');
        }

        // Transisi: Menghilangkan Loader
        loaderOverlay.style.opacity = '0';
        setTimeout(() => {
          loaderOverlay.remove();
          document.body.style.opacity = '1';
          lucide.createIcons(); // Render icon Lucide
        }, 600);

      } catch (err) {
        console.error("Sinkronisasi Gagal:", err);
        loaderSpinner.style.display = 'none';
        loaderText.innerHTML = `
          <span class="text-rose-500 font-black uppercase">⚠️ Koneksi Terputus</span><br>
          <span class="text-white/40 text-[9px] mt-2 block tracking-widest uppercase">Periksa Backend Apps Script Anda</span>
        `;
      }
    }

    /**
     * FUNGSI: HANDLE SUBMIT DATA (POST)
     */
    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const originalText = btn.innerText;
      
      // Update Button State (Loading)
      btn.innerText = "⏳ SEDANG MEMPROSES DATA...";
      btn.disabled = true;

      const formData = new FormData(e.target);
      const payloadData = Object.fromEntries(formData.entries());

      try {
        /**
         * PENGIRIMAN DATA KE GOOGLE SHEETS
         * Menggunakan mode 'no-cors' agar tidak terblokir oleh kebijakan CORS browser.
         */
        await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadData)
        });

        // Transisi ke State Berhasil
        document.getElementById('formWrapper').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
        lucide.createIcons();

        // Redirect otomatis jika dikonfigurasi oleh campaign terkait
        if (appSettings.redirectUrl) {
          setTimeout(() => { 
            window.location.href = appSettings.redirectUrl; 
          }, 3500);
        }

      } catch (err) {
        console.error("Submit Error:", err);
        alert("Terjadi kesalahan saat mengirim data. Silakan coba lagi.");
        btn.disabled = false;
        btn.innerText = originalText;
      }
    }

    // Jalankan inisialisasi saat struktur DOM siap
    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
