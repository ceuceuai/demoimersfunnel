<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iMersFunnel | Menghubungkan...</title>
  
  <!-- Framework CSS: Tailwind CSS untuk styling cepat dan responsif -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Font: Plus Jakarta Sans untuk kesan premium dan modern -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons: Icon pack yang bersih dan ringan -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /** * =========================================================================
     * BASE TRANSITION & GLOBAL FONTS
     * =========================================================================
     */
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
      opacity: 0;
      transition: opacity 0.8s ease-in-out, background 0.5s ease;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /** * =========================================================================
     * THEME ENGINE: Kontrol Warna & Kontras Dinamis
     * Mengatur variabel warna berdasarkan pilihan di Dashboard Admin.
     * =========================================================================
     */
    
    /* 1. Midnight (Dark Premium - Tema Default iMersFunnel) */
    .theme-midnight { background: radial-gradient(circle at top left, #1e1b4b, #0f172a); color: white; }
    .theme-midnight .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    .theme-midnight .input-control { background: rgba(30, 41, 59, 0.6); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }
    .theme-midnight h1 { background: linear-gradient(to bottom, #ffffff, rgba(255,255,255,0.7)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* 2. Clean (Light Modern - Bersih dan Minimalis) */
    .theme-clean { background: #f8fafc; color: #0f172a; }
    .theme-clean .glass { background: white; border: 1px solid #e2e8f0; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); }
    .theme-clean .input-control { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
    .theme-clean h1 { color: #1e1b4b; background: none; -webkit-text-fill-color: initial; }
    .theme-clean p { color: #64748b; }
    .theme-clean label { color: #475569; font-weight: 700; }

    /* 3. Nature (Deep Green Earth - Segar dan Terpercaya) */
    .theme-nature { background: radial-gradient(circle at top left, #064e3b, #022c22); color: white; }
    .theme-nature .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    .theme-nature .input-control { background: rgba(6, 78, 59, 0.4); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }

    /** * =========================================================================
     * LAYOUT ENGINE: Kontrol Struktur Halaman (Center vs Split)
     * =========================================================================
     */
    #mainWrapper { 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- Mode: Center (Original / Straight) --- */
    .layout-center { 
      align-items: center; 
      text-align: center; 
      justify-content: center;
    }
    .layout-center #contentSide { 
      margin-bottom: 3rem; 
      width: 100%; 
      max-width: 650px;
    }
    .layout-center .glass { 
      max-width: 460px; 
      width: 100%; 
      margin: 0 auto;
    }

    /* --- Mode: Split (Alternatif / Side-by-Side) --- */
    .layout-split { 
      align-items: center; 
      gap: 60px; 
      max-width: 1200px; 
      width: 100%; 
      margin: 0 auto; 
    }
    @media (min-width: 768px) { 
      .layout-split { flex-direction: row; justify-content: space-between; text-align: left; }
      .layout-split #contentSide { width: 50%; text-align: left; }
      .layout-split #contentSide img { margin-left: 0; margin-right: auto; }
      .layout-split #formSide { width: 440px; flex-shrink: 0; }
      .layout-split #dynamicTagline { margin-left: 0; }
    }

    /** * =========================================================================
     * UI COMPONENTS & ANIMATIONS
     * =========================================================================
     */
    .glass { 
      backdrop-filter: blur(28px); 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
      border-radius: 2rem; 
      padding: 3rem; 
      position: relative;
      overflow: hidden;
      z-index: 10;
    }

    .input-control { 
      width: 100%; 
      padding: 1.2rem 1.5rem; 
      border-radius: 1rem; 
      margin-top: 0.7rem; 
      outline: none; 
      transition: all 0.4s ease; 
      font-size: 1rem; 
    }
    
    .input-control:focus { 
      border-color: #6366f1; 
      box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.2); 
    }

    /* CTA Button dengan animasi bouncing hover */
    .btn-cta { 
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); 
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 15px 30px -8px rgba(99, 102, 241, 0.6);
      cursor: pointer;
      font-weight: 800;
      color: white;
      letter-spacing: 0.05em;
    }
    
    .btn-cta:hover { 
      transform: translateY(-5px) scale(1.03); 
      filter: brightness(1.1);
      box-shadow: 0 25px 40px -12px rgba(99, 102, 241, 0.7);
    }

    .btn-cta:active {
      transform: translateY(0) scale(0.98);
    }

    /* Loader / Splash Screen Overlay */
    #loader-overlay { 
      position: fixed; 
      inset: 0; 
      background: #0f172a; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      z-index: 9999; 
      transition: opacity 0.7s ease; 
    }
    
    /* Animasi Masuk Halaman */
    .animate-in { 
      animation: fadeInEffect 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
    }
    @keyframes fadeInEffect { 
      from { opacity: 0; transform: translateY(40px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    /* Icon Sukses dengan animasi pop */
    .success-icon-wrap {
      animation: popInSuccess 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popInSuccess {
      from { transform: scale(0.4); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="theme-midnight">

  <!-- =========================================================================
       LAYER 1: SPLASH LOADING SCREEN
       Mencegah tampilan berantakan (FOUC) saat data sedang dimuat dari API.
       ========================================================================= -->
  <div id="loader-overlay">
    <div class="flex flex-col items-center gap-8 text-center">
      <div id="loader-spinner" class="w-18 h-18 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
      <div class="space-y-3">
        <p id="loader-text" class="text-[12px] font-black text-indigo-400 uppercase tracking-[0.5em] animate-pulse">Menghubungkan Server...</p>
        <p class="text-[9px] text-slate-700 font-bold uppercase tracking-widest">iMersFunnel Pro Engine</p>
      </div>
    </div>
  </div>

  <!-- =========================================================================
       LAYER 2: MAIN DYNAMIC CONTAINER
       Kontainer ini akan berubah struktur berdasarkan setting 'layout' (Center/Split).
       ========================================================================= -->
  <div id="mainWrapper" class="layout-center animate-in">
    
    <!-- SUB-LAYER A: BRANDING & HEADLINE AREA -->
    <div id="contentSide" class="z-20">
      <!-- Logo Dinamis (Akan muncul jika URL diisi) -->
      <div id="logoWrapper" class="hidden mb-10">
        <img id="dynamicLogo" src="" alt="Brand Logo" class="h-24 w-auto mx-auto object-contain drop-shadow-2xl transition-all duration-700">
      </div>
      
      <!-- Judul Aplikasi Dinamis (Besar dan Tegas) -->
      <h1 id="dynamicAppName" class="text-4xl md:text-7xl font-extrabold tracking-tighter uppercase tracking-widest leading-none mb-6">
        <!-- Dimuat via JavaScript -->
      </h1>
      
      <!-- Tagline / Deskripsi Singkat -->
      <p id="dynamicTagline" class="text-base md:text-lg font-medium opacity-60 leading-relaxed mx-auto max-w-lg mb-2">
        <!-- Dimuat via JavaScript -->
      </p>

      <!-- Showcase Gambar Produk (Hanya Muncul di Layout Split) -->
      <div id="productImageWrapper" class="hidden mt-14 transform transition-all duration-1000 scale-95 opacity-0">
        <img id="productImage" src="" alt="Product Showcase" class="w-full rounded-3xl shadow-[0_30px_60px_-15px_rgba(0,0,0,0.8)] border border-white/10 ring-1 ring-white/20">
      </div>
    </div>

    <!-- SUB-LAYER B: FORM INTERACTION AREA -->
    <div id="formSide" class="w-full flex justify-center z-20">
      <main class="glass">
        
        <!-- STATE 1: PENDAFTARAN (Daftar Sekarang) -->
        <div id="formWrapper" class="transition-all duration-700">
          <div class="text-center mb-12">
            <h2 class="text-2xl font-extrabold tracking-tight uppercase tracking-[0.2em]">Daftar Sekarang</h2>
            <div class="w-16 h-1.5 bg-indigo-500 mx-auto mt-5 rounded-full opacity-50 shadow-xl shadow-indigo-500/20"></div>
          </div>

          <form id="leadForm" onsubmit="handleSubmit(event)" class="space-y-9">
            <!-- Hidden Campaign ID: Mengirim referensi kampanye ke database -->
            <input type="hidden" id="campaignInput" name="campaign" value="GENERAL">
            
            <!-- Field 1: Nama Lengkap -->
            <div class="group">
              <label class="text-[12px] font-black opacity-60 ml-2 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
                Nama Lengkap
              </label>
              <input type="text" name="nama" required placeholder="Contoh: Budi Santoso" class="input-control">
            </div>

            <!-- Field 2: Email Aktif -->
            <div class="group">
              <label class="text-[12px] font-black opacity-60 ml-2 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
                Email Aktif
              </label>
              <input type="email" name="email" required placeholder="budi@email.com" class="input-control">
            </div>

            <!-- Field 3: WhatsApp -->
            <div class="group">
              <label class="text-[12px] font-black opacity-60 ml-2 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
                Nomor WhatsApp
              </label>
              <input type="tel" name="wa" required placeholder="081234567890" class="input-control">
            </div>

            <!-- Tombol Aksi Utama -->
            <button type="submit" id="submitBtn" class="btn-cta w-full py-6 rounded-2xl font-black text-xl mt-8 uppercase tracking-widest active:scale-95">
              <!-- Teks dinamis dari API -->
            </button>
            
            <!-- Keamanan & Trust Badge -->
            <div class="flex items-center justify-center gap-4 mt-10 opacity-30">
              <i data-lucide="lock" class="w-4 h-4"></i>
              <p class="text-[10px] font-black uppercase tracking-widest">Sistem Aman & Terenkripsi</p>
            </div>
          </form>
        </div>

        <!-- STATE 2: SUKSES (Tampilan Berhasil) -->
        <div id="successState" class="hidden text-center py-16 animate-in">
          <div class="success-icon-wrap w-28 h-28 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto mb-12 border border-indigo-500/20 shadow-2xl">
            <i data-lucide="check-circle-2" class="w-14 h-14 text-indigo-400"></i>
          </div>
          <h2 class="text-4xl font-black mb-5 uppercase tracking-tighter">Berhasil!</h2>
          <p class="opacity-60 text-base leading-relaxed mb-14 px-8 font-medium">
            Terima kasih pendaftaran Anda telah kami terima. Akses eksklusif akan segera dikirimkan ke WhatsApp Anda.
          </p>
          
          <!-- Indikator Redirect -->
          <div class="inline-flex items-center gap-5 px-10 py-5 bg-white/5 rounded-full border border-white/10 shadow-inner">
            <div class="w-3 h-3 bg-indigo-500 rounded-full animate-ping"></div>
            <p class="text-[11px] font-black uppercase tracking-[0.3em]">Mengarahkan Halaman...</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- LAYER 3: FOOTER -->
  <footer class="mt-24 text-center opacity-20 pb-16">
    <p class="text-[11px] font-bold tracking-[0.6em] uppercase">
      &copy; 2026 iMersFunnel Pro &bull; Smart Conversion Engine
    </p>
  </footer>

  <!-- =========================================================================
       JAVASCRIPT DYNAMIC ENGINE
       ========================================================================= -->
  <script>
    /**
     * KONFIGURASI BACKEND API (Google Apps Script Web App)
     * Alamat URL tempat database bos berada.
     */
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzXlMjRlKGybOmFvqukScuNr02qKs4VR46m3tIPep6ahuVkdPU0w0dGjhwJQ0YlQHuWew/exec"; 

    /**
     * LOGIKA DETEKSI CAMPAIGN
     * Mendeteksi ID kampanye dari URL parameter atau URL path (Vercel).
     */
    const urlParams = new URLSearchParams(window.location.search);
    const pathSegments = window.location.pathname.split('/').filter(Boolean);
    const pathCampaign = pathSegments.pop();
    const campaignId = urlParams.get('campaign') || pathCampaign || "GENERAL";
    
    let appSettings = {}; // Variabel global untuk menyimpan data visual dari server

    /**
     * FUNGSI: INISIALISASI HALAMAN (FETCH SETTINGS)
     * Mengambil data branding, tema, layout, dan redirect dari backend.
     */
    async function initPage() {
      const loader = document.getElementById('loader-overlay');
      const wrapper = document.getElementById('mainWrapper');

      try {
        // Melakukan request GET ke backend khusus untuk data kampanye ini
        const response = await fetch(`${WEB_APP_URL}?action=getSettings&campaign=${campaignId}`);
        if (!response.ok) throw new Error("Gagal terhubung ke API iMersFunnel");
        
        appSettings = await response.json();

        // --- 1. TERAPKAN THEME ENGINE (Warna & Background) ---
        document.body.className = `theme-${appSettings.theme || 'midnight'}`;
        
        // Logika Background Kustom (Solid/Image)
        if (appSettings.bgType === 'solid' && appSettings.bgValue) {
          document.body.style.background = appSettings.bgValue;
        } else if (appSettings.bgType === 'image' && appSettings.bgValue) {
          document.body.style.backgroundImage = `url('${appSettings.bgValue}')`;
        }

        // --- 2. TERAPKAN LAYOUT ENGINE (Fix: Reset Centering) ---
        if (appSettings.layout === 'split') {
          wrapper.className = "layout-split animate-in";
          // Jika layout split, tampilkan gambar produk jika ada URL-nya
          if (appSettings.productImageUrl) {
            const prodImg = document.getElementById('productImage');
            prodImg.src = appSettings.productImageUrl;
            const prodWrap = document.getElementById('productImageWrapper');
            prodWrap.classList.remove('hidden');
            // Animasi kemunculan gambar
            setTimeout(() => { 
              prodWrap.classList.remove('scale-95', 'opacity-0');
              prodWrap.classList.add('scale-100', 'opacity-100');
            }, 800);
          }
        } else {
          // PAKSA BALIK KE CENTER ORIGINAL (Lurus dan Elegan)
          wrapper.className = "layout-center animate-in";
          document.getElementById('productImageWrapper').classList.add('hidden');
        }

        // --- 3. TERAPKAN BRANDING DINAMIS ---
        document.title = appSettings.appName || "iMersFunnel Pro";
        document.getElementById('dynamicAppName').innerText = appSettings.appName || "iMersFunnel";
        document.getElementById('dynamicTagline').innerText = appSettings.tagline || "";
        document.getElementById('submitBtn').innerText = appSettings.btnText || "Dapatkan Akses Sekarang";
        document.getElementById('campaignInput').value = campaignId;

        // Logika Tampilan Logo
        if (appSettings.showLogo && appSettings.logoUrl) {
          const logoImg = document.getElementById('dynamicLogo');
          logoImg.src = appSettings.logoUrl;
          document.getElementById('logoWrapper').classList.remove('hidden');
        }

        // Selesai: Hapus Loader Splash Screen
        loader.style.opacity = '0';
        setTimeout(() => { 
          loader.remove(); 
          document.body.style.opacity = '1'; 
          lucide.createIcons(); // Aktifkan icon Lucide
        }, 700);

      } catch (err) { 
        console.error("Gagal Sinkronisasi:", err); 
        document.getElementById('loader-text').innerHTML = "<span class='text-rose-500'>Gangguan Jaringan Server.</span>";
      }
    }

    /**
     * FUNGSI: HANDLE FORM SUBMISSION (POST DATA)
     * Mengirim data pendaftar ke Spreadsheet tanpa reload halaman.
     */
    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const originalText = btn.innerText;
      
      // Update tampilan tombol menjadi loading
      btn.innerText = "⏳ SEDANG MEMPROSES DATA..."; 
      btn.disabled = true;
      
      const formData = new FormData(e.target);
      const payload = Object.fromEntries(formData.entries());

      try {
        // Mengirim data menggunakan Fetch API (Mode no-cors untuk kompatibilitas GAS)
        await fetch(WEB_APP_URL, { 
          method: 'POST', 
          mode: 'no-cors', 
          body: JSON.stringify(payload) 
        });

        // Transisi: Sembunyikan Form, Tampilkan State Sukses
        document.getElementById('formWrapper').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
        lucide.createIcons();

        // Logika Redirect Otomatis: Mengarahkan user setelah pendaftaran berhasil
        if (appSettings.redirectUrl) {
          setTimeout(() => { 
            window.location.href = appSettings.redirectUrl; 
          }, 4500);
        }
      } catch (err) { 
        console.error("Kesalahan Pengiriman:", err);
        btn.disabled = false; 
        btn.innerText = originalText; 
        alert("Maaf, terjadi gangguan saat mengirim data. Silakan coba sesaat lagi.");
      }
    }

    // Jalankan mesin inisialisasi saat browser siap
    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
