<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iMersFunnel | Menghubungkan...</title>
  
  <!-- Framework & Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /** * ==========================================
     * BASE TRANSITION & GLOBAL FONTS
     * ==========================================
     */
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
      opacity: 0;
      transition: opacity 0.8s ease-in-out, background 0.5s ease;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /** * ==========================================
     * THEME ENGINE: Kontrol Warna & Kontras
     * ==========================================
     */
    /* Midnight (Dark Premium - Default) */
    .theme-midnight { background: radial-gradient(circle at top left, #1e1b4b, #0f172a); color: white; }
    .theme-midnight .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    .theme-midnight .input-control { background: rgba(30, 41, 59, 0.6); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }
    .theme-midnight h1 { background: linear-gradient(to bottom, #ffffff, rgba(255,255,255,0.7)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Clean (Light Modern) */
    .theme-clean { background: #f8fafc; color: #0f172a; }
    .theme-clean .glass { background: white; border: 1px solid #e2e8f0; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); }
    .theme-clean .input-control { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
    .theme-clean h1 { color: #1e1b4b; background: none; -webkit-text-fill-color: initial; }
    .theme-clean p { color: #64748b; }
    .theme-clean label { color: #475569; font-weight: 700; }

    /* Nature (Deep Green Earth) */
    .theme-nature { background: radial-gradient(circle at top left, #064e3b, #022c22); color: white; }
    .theme-nature .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    .theme-nature .input-control { background: rgba(6, 78, 59, 0.4); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }

    /** * ==========================================
     * LAYOUT ENGINE: Center (Original) vs Split
     * ==========================================
     */
    #mainWrapper { 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- Layout Lurus (Center) - KEMBALI KE ESTETIKA PERTAMA --- */
    .layout-center { 
      align-items: center; 
      text-align: center; 
      justify-content: center;
    }
    .layout-center #contentSide { 
      margin-bottom: 2.5rem; 
      width: 100%; 
      max-width: 600px;
    }
    .layout-center .glass { 
      max-width: 440px; 
      width: 100%; 
      margin: 0 auto;
    }

    /* --- Layout Alternatif (Split) - Kiri Kanan Modern --- */
    .layout-split { 
      align-items: center; 
      gap: 50px; 
      max-width: 1150px; 
      width: 100%; 
      margin: 0 auto; 
    }
    @media (min-width: 768px) { 
      .layout-split { flex-direction: row; justify-content: space-between; text-align: left; }
      .layout-split #contentSide { width: 50%; text-align: left; }
      .layout-split #contentSide img { margin-left: 0; margin-right: auto; }
      .layout-split #formSide { width: 440px; flex-shrink: 0; }
    }

    /** * ==========================================
     * UI COMPONENTS (Glassmorphism & Branding)
     * ==========================================
     */
    .glass { 
      backdrop-filter: blur(24px); 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
      border-radius: 1.75rem; 
      padding: 2.75rem; 
      position: relative;
      overflow: hidden;
      z-index: 5;
    }

    .input-control { 
      width: 100%; 
      padding: 1.15rem 1.4rem; 
      border-radius: 0.9rem; 
      margin-top: 0.65rem; 
      outline: none; 
      transition: all 0.3s ease; 
      font-size: 0.95rem; 
    }
    
    .input-control:focus { 
      border-color: #6366f1; 
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); 
    }

    .btn-cta { 
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 12px 24px -6px rgba(99, 102, 241, 0.5);
      cursor: pointer;
      font-weight: 800;
      color: white;
      letter-spacing: 0.025em;
    }
    
    .btn-cta:hover { 
      transform: translateY(-4px) scale(1.02); 
      filter: brightness(1.1);
      box-shadow: 0 20px 35px -10px rgba(99, 102, 241, 0.6);
    }

    /* Loader Overlay */
    #loader-overlay { 
      position: fixed; 
      inset: 0; 
      background: #0f172a; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      z-index: 9999; 
      transition: opacity 0.6s ease; 
    }
    
    .animate-in { 
      animation: fadeInEffect 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
    }
    @keyframes fadeInEffect { 
      from { opacity: 0; transform: translateY(30px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    /* Success Pop */
    .success-icon-wrap {
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="theme-midnight">

  <!-- LAYER 1: LOADING SCREEN -->
  <div id="loader-overlay">
    <div class="flex flex-col items-center gap-6 text-center">
      <div id="loader-spinner" class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
      <div class="space-y-2">
        <p id="loader-text" class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.4em] animate-pulse">Menghubungkan Database...</p>
        <p class="text-[8px] text-slate-600 font-bold uppercase tracking-widest">Sinkronisasi Real-Time Aktif</p>
      </div>
    </div>
  </div>

  <!-- LAYER 2: MAIN DYNAMIC CONTAINER -->
  <div id="mainWrapper" class="layout-center animate-in">
    
    <!-- BRANDING & CONTENT AREA -->
    <div id="contentSide">
      <!-- Logo Wrapper -->
      <div id="logoWrapper" class="hidden mb-8">
        <img id="dynamicLogo" src="" alt="Brand Logo" class="h-20 w-auto mx-auto object-contain drop-shadow-2xl transition-all duration-500">
      </div>
      
      <!-- Judul Dinamis -->
      <h1 id="dynamicAppName" class="text-4xl md:text-6xl font-extrabold tracking-tighter uppercase tracking-widest leading-tight mb-5">
        <!-- Data dari API -->
      </h1>
      
      <!-- Tagline Dinamis -->
      <p id="dynamicTagline" class="text-sm md:text-base font-medium opacity-70 leading-relaxed mx-auto max-w-md">
        <!-- Data dari API -->
      </p>

      <!-- Product Image (Hanya Muncul Jika Split Layout Aktif) -->
      <div id="productImageWrapper" class="hidden mt-12 transform transition-all duration-1000">
        <img id="productImage" src="" alt="Product Showcase" class="w-full rounded-3xl shadow-2xl border border-white/10 ring-1 ring-white/20">
      </div>
    </div>

    <!-- FORM SUBMISSION AREA -->
    <div id="formSide" class="w-full flex justify-center">
      <main class="glass">
        
        <!-- Form State -->
        <div id="formWrapper" class="transition-all duration-500">
          <div class="text-center mb-10">
            <h2 class="text-xl font-extrabold tracking-tight uppercase tracking-wider">Daftar Sekarang</h2>
            <div class="w-12 h-1 bg-indigo-500 mx-auto mt-4 rounded-full opacity-40"></div>
          </div>

          <form id="leadForm" onsubmit="handleSubmit(event)" class="space-y-8">
            <!-- Hidden Campaign ID -->
            <input type="hidden" id="campaignInput" name="campaign" value="GENERAL">
            
            <div class="group">
              <label class="text-[11px] font-bold opacity-60 ml-1 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
                Nama Lengkap
              </label>
              <input type="text" name="nama" required placeholder="Budi Santoso" class="input-control">
            </div>

            <div class="group">
              <label class="text-[11px] font-bold opacity-60 ml-1 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
                Email Aktif
              </label>
              <input type="email" name="email" required placeholder="budi@email.com" class="input-control">
            </div>

            <div class="group">
              <label class="text-[11px] font-bold opacity-60 ml-1 uppercase tracking-widest group-focus-within:text-indigo-400 transition-colors">
                Nomor WhatsApp
              </label>
              <input type="tel" name="wa" required placeholder="0812xxxxxx" class="input-control">
            </div>

            <button type="submit" id="submitBtn" class="btn-cta w-full py-5 rounded-2xl font-black text-lg mt-6 uppercase tracking-widest">
              <!-- Teks dari API -->
            </button>
            
            <div class="flex items-center justify-center gap-3 mt-8 opacity-40">
              <i data-lucide="shield-check" class="w-4 h-4"></i>
              <p class="text-[9px] font-black uppercase tracking-widest">Data Aman & Terenkripsi 100%</p>
            </div>
          </form>
        </div>

        <!-- Success State -->
        <div id="successState" class="hidden text-center py-12 animate-in">
          <div class="success-icon-wrap w-24 h-24 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto mb-10 border border-indigo-500/20">
            <i data-lucide="party-popper" class="w-12 h-12 text-indigo-400"></i>
          </div>
          <h2 class="text-3xl font-black mb-4 uppercase tracking-tighter">Berhasil!</h2>
          <p class="opacity-70 text-sm leading-relaxed mb-12 px-6">
            Data pendaftaran Anda telah kami terima. Akses akan segera dikirimkan ke WhatsApp Anda.
          </p>
          <div class="inline-flex items-center gap-4 px-8 py-4 bg-white/5 rounded-full border border-white/10 shadow-inner">
            <div class="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-ping"></div>
            <p class="text-[10px] font-black uppercase tracking-[0.2em]">Mengarahkan Halaman...</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="mt-20 text-center opacity-30 pb-12">
    <p class="text-[10px] font-black tracking-[0.5em] uppercase">
      &copy; 2026 iMersFunnel Pro &bull; Smart Funnel System
    </p>
  </footer>

  <!-- SCRIPT LOGIC: SINKRONISASI TEMA, LAYOUT, & BRANDING -->
  <script>
    /**
     * KONFIGURASI BACKEND API
     */
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzXlMjRlKGybOmFvqukScuNr02qKs4VR46m3tIPep6ahuVkdPU0w0dGjhwJQ0YlQHuWew/exec"; 

    // Deteksi ID Campaign dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const pathCampaign = window.location.pathname.split('/').filter(Boolean).pop();
    const campaignId = urlParams.get('campaign') || pathCampaign || "GENERAL";
    
    let appSettings = {};

    /**
     * FUNGSI: INISIALISASI HALAMAN (FETCH SETTINGS)
     */
    async function initPage() {
      try {
        const response = await fetch(`${WEB_APP_URL}?action=getSettings&campaign=${campaignId}`);
        if (!response.ok) throw new Error("Gagal terhubung ke API");
        
        appSettings = await response.json();
        const wrapper = document.getElementById('mainWrapper');

        // 1. TERAPKAN THEME & BACKGROUND ENGINE
        document.body.className = `theme-${appSettings.theme || 'midnight'}`;
        
        if (appSettings.bgType === 'solid' && appSettings.bgValue) {
          document.body.style.background = appSettings.bgValue;
        } else if (appSettings.bgType === 'image' && appSettings.bgValue) {
          document.body.style.backgroundImage = `url('${appSettings.bgValue}')`;
        }

        // 2. TERAPKAN LAYOUT ENGINE (Fix: Reset ke Center Original atau Split)
        if (appSettings.layout === 'split') {
          wrapper.className = "layout-split animate-in";
          if (appSettings.productImageUrl) {
            document.getElementById('productImage').src = appSettings.productImageUrl;
            document.getElementById('productImageWrapper').classList.remove('hidden');
          }
        } else {
          // PAKSA BALIK KE CENTER (Estetika Versi Pertama)
          wrapper.className = "layout-center animate-in";
          document.getElementById('productImageWrapper').classList.add('hidden');
        }

        // 3. TERAPKAN BRANDING DINAMIS
        document.title = appSettings.appName || "iMersFunnel";
        document.getElementById('dynamicAppName').innerText = appSettings.appName || "iMersFunnel";
        document.getElementById('dynamicTagline').innerText = appSettings.tagline || "";
        document.getElementById('submitBtn').innerText = appSettings.btnText || "Dapatkan Akses Sekarang";
        document.getElementById('campaignInput').value = campaignId;

        // Logika Tampilan Logo
        if (appSettings.showLogo && appSettings.logoUrl) {
          const logoImg = document.getElementById('dynamicLogo');
          logoImg.src = appSettings.logoUrl;
          document.getElementById('logoWrapper').classList.remove('hidden');
        }

        // Selesai: Hapus Loader
        const loader = document.getElementById('loader-overlay');
        loader.style.opacity = '0';
        setTimeout(() => { 
          loader.remove(); 
          document.body.style.opacity = '1'; 
          lucide.createIcons(); 
        }, 600);

      } catch (err) { 
        console.error("Sinkronisasi Gagal:", err); 
        document.getElementById('loader-text').innerHTML = "<span class='text-rose-500'>Gangguan Koneksi Server.</span>";
      }
    }

    /**
     * FUNGSI: HANDLE FORM SUBMISSION (POST DATA)
     */
    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const originalText = btn.innerText;
      
      btn.innerText = "⏳ SEDANG MEMPROSES..."; 
      btn.disabled = true;
      
      const formData = new FormData(e.target);
      const payload = Object.fromEntries(formData.entries());

      try {
        // Mengirim data ke Apps Script (Mode no-cors untuk keamanan browser)
        await fetch(WEB_APP_URL, { 
          method: 'POST', 
          mode: 'no-cors', 
          body: JSON.stringify(payload) 
        });

        // Transisi ke State Sukses
        document.getElementById('formWrapper').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
        lucide.createIcons();

        // Redirect otomatis jika dikonfigurasi
        if (appSettings.redirectUrl) {
          setTimeout(() => { window.location.href = appSettings.redirectUrl; }, 4000);
        }
      } catch (err) { 
        btn.disabled = false; 
        btn.innerText = originalText; 
        alert("Maaf, terjadi gangguan jaringan. Silakan coba lagi.");
      }
    }

    // Jalankan inisialisasi saat struktur DOM siap
    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
